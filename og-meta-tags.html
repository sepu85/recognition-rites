<!--
  ═══════════════════════════════════════════════════════════════
  RICH LINK PREVIEW — Open Graph + Twitter Card Meta Tags
  ═══════════════════════════════════════════════════════════════
  
  Paste these inside your <head> tag in index.html,
  after the existing <meta> tags.
  
  IMPORTANT: Replace the og:image URL with your actual hosted 
  image URL after uploading the preview image to your server.
  
  The preview image should be:
  - 1200 x 630 pixels (ideal for WhatsApp, Telegram, iMessage, 
    Twitter, Facebook, LinkedIn, Slack)
  - PNG or JPG
  - Under 5MB
  - Hosted at a publicly accessible URL on your domain
  ═══════════════════════════════════════════════════════════════
-->

<!-- Open Graph (WhatsApp, Telegram, Facebook, LinkedIn, iMessage) -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://recognitionrites.com">
<meta property="og:title" content="Recognition Rites — Expand your edges. Keep your spark.">
<meta property="og:description" content="A guided exploration of awareness, embodiment, and what it means to feel alive. By Bige & Gustavo.">
<meta property="og:image" content="https://recognitionrites.com/og-preview.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:site_name" content="Recognition Rites">

<!-- Twitter Card (also used by some other platforms) -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Recognition Rites — Expand your edges. Keep your spark.">
<meta name="twitter:description" content="A guided exploration of awareness, embodiment, and what it means to feel alive.">
<meta name="twitter:image" content="https://recognitionrites.com/og-preview.png">
