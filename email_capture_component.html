<!-- 
  ═══════════════════════════════════════════════════════════════
  RECOGNITION RITES — Email Capture Component
  ═══════════════════════════════════════════════════════════════
  
  DROP THIS into your index.html wherever you want the email form.
  Recommended placement: just before the footer, or after the 
  "Your response shapes this" section.
  
  INTEGRATION OPTIONS (choose one):
  
  OPTION A — Google Sheets (easiest, 5 min setup)
    1. Create a Google Sheet with columns: Timestamp | Email
    2. Go to Extensions > Apps Script
    3. Paste the Apps Script code below
    4. Deploy as Web App (execute as: Me, access: Anyone)
    5. Copy the web app URL into GOOGLE_SCRIPT_URL below
  
  OPTION B — Airtable (if you prefer)
    1. Create an Airtable base with a table called "Email List"
    2. Add fields: Email (email type), Date (date type)
    3. Get your Airtable API key and Base ID
    4. Fill in AIRTABLE_API_KEY and AIRTABLE_BASE_ID below
    
  NOTE: Only ONE option should be active. Comment out the other.
  ═══════════════════════════════════════════════════════════════
-->

<!-- ── THE HTML COMPONENT ── -->
<!-- Paste this into your index.html where you want it to appear -->

<section id="stay-close" style="padding: 3.5rem 0;">
  <div style="max-width: 560px; margin: 0 auto; padding: 0 2rem; text-align: center;">
    
    <!-- Gold accent line -->
    <div style="width: 50px; height: 2px; background: #D4A574; margin: 0 auto 1.5rem;"></div>
    
    <!-- Heading -->
    <h3 style="font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.6rem; font-weight: 500; color: #0A7E8C; margin: 0 0 0.6rem;">
      Stay close to this
    </h3>
    
    <!-- Subtext -->
    <p style="font-size: 0.95rem; color: #666; margin: 0 0 1.8rem; line-height: 1.7;">
      Leave your email and we'll let you know when Recognition Rites opens its doors.<br>
      No spam. Just one message when it matters.
    </p>
    
    <!-- Form -->
    <form id="email-capture-form" onsubmit="handleEmailSubmit(event)" style="display: flex; gap: 8px; max-width: 420px; margin: 0 auto;">
      <input 
        type="email" 
        id="email-input"
        placeholder="your@email.com" 
        required
        style="
          flex: 1;
          padding: 12px 16px;
          border: 1px solid #ddd;
          border-radius: 6px;
          font-family: 'DM Sans', sans-serif;
          font-size: 0.95rem;
          background: #fff;
          color: #2C2C2C;
          outline: none;
          transition: border-color 0.2s;
          min-width: 0;
        "
        onfocus="this.style.borderColor='#0A7E8C'"
        onblur="this.style.borderColor='#ddd'"
      />
      <button 
        type="submit"
        id="email-submit-btn"
        style="
          padding: 12px 22px;
          border: 1px solid #0A7E8C;
          border-radius: 6px;
          font-family: 'DM Sans', sans-serif;
          font-size: 0.95rem;
          font-weight: 500;
          cursor: pointer;
          background: #0A7E8C;
          color: #fff;
          white-space: nowrap;
          transition: all 0.3s;
        "
        onmouseenter="this.style.background='#065E68'"
        onmouseleave="this.style.background='#0A7E8C'"
      >
        Keep me close
      </button>
    </form>
    
    <!-- Status message (hidden by default) -->
    <p id="email-status" style="font-size: 0.85rem; margin: 1rem 0 0; min-height: 1.2em; color: #666;"></p>
    
    <!-- Fine print -->
    <p style="font-size: 0.75rem; color: #aaa; margin: 0.5rem 0 0;">
      We respect your attention. Unsubscribe anytime.
    </p>
  </div>
</section>


<!-- ── THE JAVASCRIPT ── -->
<!-- Paste this just before your closing </body> tag -->

<script>
// ═══════════════════════════════════════
// CONFIGURATION — Fill in ONE of these:
// ═══════════════════════════════════════

// OPTION A: Google Sheets
const GOOGLE_SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL';

// OPTION B: Airtable  
const AIRTABLE_API_KEY = 'YOUR_AIRTABLE_API_KEY';
const AIRTABLE_BASE_ID = 'YOUR_AIRTABLE_BASE_ID';
const AIRTABLE_TABLE_NAME = 'Email List';

// Set which integration to use: 'google' or 'airtable'
const INTEGRATION = 'google';

// ═══════════════════════════════════════

async function handleEmailSubmit(e) {
  e.preventDefault();
  
  const emailInput = document.getElementById('email-input');
  const submitBtn = document.getElementById('email-submit-btn');
  const status = document.getElementById('email-status');
  const email = emailInput.value.trim();
  
  if (!email) return;
  
  // Show loading state
  submitBtn.textContent = 'Sending...';
  submitBtn.disabled = true;
  submitBtn.style.opacity = '0.7';
  status.textContent = '';
  
  try {
    if (INTEGRATION === 'google') {
      await submitToGoogleSheets(email);
    } else {
      await submitToAirtable(email);
    }
    
    // Success
    submitBtn.textContent = 'You\u2019re in \u2713';
    submitBtn.style.background = '#0A7E8C';
    submitBtn.style.opacity = '1';
    status.textContent = 'Welcome. We\u2019ll be in touch when it\u2019s time.';
    status.style.color = '#0A7E8C';
    emailInput.value = '';
    emailInput.disabled = true;
    
  } catch (err) {
    // Error
    submitBtn.textContent = 'Keep me close';
    submitBtn.disabled = false;
    submitBtn.style.opacity = '1';
    status.textContent = 'Something went wrong. Try again or email us directly.';
    status.style.color = '#C97B63';
    console.error('Email submit error:', err);
  }
}

// ── OPTION A: Google Sheets ──
async function submitToGoogleSheets(email) {
  const response = await fetch(GOOGLE_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, timestamp: new Date().toISOString() })
  });
  // Note: mode 'no-cors' means we can't read the response,
  // but the data still reaches the sheet. 
  // If you need confirmation, use the Apps Script approach below.
}

// ── OPTION B: Airtable ──
async function submitToAirtable(email) {
  const response = await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${AIRTABLE_API_KEY}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      records: [{
        fields: {
          'Email': email,
          'Date': new Date().toISOString().split('T')[0]
        }
      }]
    })
  });
  
  if (!response.ok) {
    throw new Error(`Airtable error: ${response.status}`);
  }
}
</script>

GOOGLE APPS SCRIPT — For Option A
═══════════════════════════════════════════════════════════════

If you chose Google Sheets, here's how to set it up:

1. Create a new Google Sheet
2. Name the first sheet "Emails"
3. In Row 1, add headers: A1 = "Timestamp" | B1 = "Email"
4. Go to Extensions > Apps Script
5. Delete the default code and paste this:

─────────────────────────────────────────
function doPost(e) {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName('Emails');
  var data = JSON.parse(e.postData.contents);
  
  sheet.appendRow([
    data.timestamp || new Date().toISOString(),
    data.email
  ]);
  
  return ContentService
    .createTextOutput(JSON.stringify({ status: 'success' }))
    .setMimeType(ContentService.MimeType.JSON);
}

function doGet(e) {
  return ContentService
    .createTextOutput('Email capture endpoint is active.')
    .setMimeType(ContentService.MimeType.TEXT);
}
─────────────────────────────────────────

6. Click Deploy > New deployment
7. Type: "Web app"
8. Execute as: "Me"
9. Who has access: "Anyone"
10. Click Deploy
11. Copy the Web App URL
12. Paste it as the value of GOOGLE_SCRIPT_URL above

Done! Emails will now appear in your Google Sheet automatically.

═══════════════════════════════════════════════════════════════
AIRTABLE SETUP — For Option B  
═══════════════════════════════════════════════════════════════

If you chose Airtable:

1. Create a new Airtable base
2. Create a table called "Email List"
3. Add fields:
   - Email (email field type)
   - Date (date field type)
4. Go to airtable.com/create/tokens
5. Create a personal access token with:
   - Scope: data.records:write
   - Access: your specific base
6. Copy the token into AIRTABLE_API_KEY above
7. Get your Base ID from the Airtable URL:
   https://airtable.com/BASE_ID_HERE/...
8. Paste it into AIRTABLE_BASE_ID above
9. Set INTEGRATION = 'airtable'

⚠️  SECURITY NOTE: The Airtable API key will be visible in 
your page source code. For a prototype with limited audience, 
this is acceptable. For production, use a server-side proxy.
The Google Sheets option doesn't have this issue.
